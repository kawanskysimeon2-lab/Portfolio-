<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickQR - Gerador Instantâneo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #090d16; color: #f8fafc; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 100%; max-width: 400px; background: #111827; padding: 25px; border-radius: 20px; border: 1px solid #1f2937; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; }
        h2 { font-size: 22px; margin-bottom: 8px; color: #38bdf8; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        input { background: #1f2937; border: 1px solid #374151; padding: 14px; border-radius: 10px; color: white; font-size: 15px; outline: none; text-align: center; }
        input:focus { border-color: #38bdf8; }
        button { background: #38bdf8; color: #090d16; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .qr-result { margin-top: 25px; display: none; background: #1e293b; padding: 20px; border-radius: 15px; animation: scaleUp 0.3s ease; }
        .qr-result img { background: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; max-width: 180px; }
        .share-text { font-size: 13px; color: #94a3b8; }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h2><i class="fas fa-qrcode"></i> QuickQR</h2>
        <p class="subtitle">Cole qualquer link para criar um QR Code na hora</p>
        
        <div class="input-box">
            <input type="text" id="linkInput" placeholder="https://exemplo.com ou texto...">
            <button onclick="generateQR()">Gerar QR Code</button>
        </div>

        <div class="qr-result" id="qrResult">
            <img id="qrImage" src="" alt="QR Code Gerado">
            <p class="share-text">Pronto! Só tirar print e mandar para a galera escanear.</p>
        </div>
    </div>

    <script>
        function generateQR() {
            const link = document.getElementById('linkInput').value.trim();
            if (!link) {
                alert('Insira um link ou texto primeiro, mano!');
                return;
            }

            const qrResult = document.getElementById('qrResult');
            const qrImage = document.getElementById('qrImage');

            // API pública que gera imagens de QR Code instantaneamente baseada no texto/link
            const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;

            qrImage.src = apiUrl;
            qrResult.style.display = 'block';
        }
    </script>
</body>
</html>
